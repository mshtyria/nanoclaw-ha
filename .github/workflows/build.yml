name: Build & Push Add-on Images

on:
  push:
    branches: [main]
    paths:
      - "nanoclaw/**"
      - ".github/workflows/build.yml"
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/nanoclaw-ha

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            build_from: ghcr.io/home-assistant/amd64-base-debian:bookworm
            docker_platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            build_from: ghcr.io/home-assistant/aarch64-base-debian:bookworm
            docker_platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from config.yaml
        id: meta
        run: |
          VERSION=$(grep '^version:' nanoclaw/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: nanoclaw
          file: nanoclaw/Dockerfile
          platforms: ${{ matrix.docker_platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          tags: |
            ${{ env.IMAGE_BASE }}-${{ matrix.arch }}:latest
            ${{ env.IMAGE_BASE }}-${{ matrix.arch }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
